<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWP — CB Delivered</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root { --bg:#0f1117; --card:#1a1d27; --card-border:#2a2d3a; --text:#e4e6eb; --text-dim:#8b8fa3; --accent:#4ade80; --warn:#f59e0b; --danger:#ef4444; --info:#60a5fa; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:40px 24px; }
  .container { max-width:1200px; margin:0 auto; }
  .header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:28px; flex-wrap:wrap; gap:16px; }
  .title { font-size:28px; font-weight:800; letter-spacing:-0.5px; }
  .subtitle { font-size:13px; color:var(--text-dim); margin-top:4px; }
  .back-link { font-size:13px; color:var(--text-dim); text-decoration:none; padding:8px 14px; border:1px solid var(--card-border); border-radius:8px; }
  .back-link:hover { border-color:var(--accent); color:var(--text); }
  .tabs { display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid var(--card-border); flex-wrap:wrap; }
  .tab { font-size:13px; font-weight:600; text-decoration:none; color:var(--text-dim); padding:10px 18px; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }

  .mock-banner { background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.4); border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:13px; color:var(--text); }
  .mock-banner strong { color:var(--warn); }
  .scope-note {
    background: rgba(96,165,250,0.08); border: 1px solid rgba(96,165,250,0.3);
    border-radius:8px; padding:10px 14px; margin-bottom:20px; font-size:12px; color:var(--text-dim);
  }
  .scope-note strong { color: var(--info); }

  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:24px; }
  .stat-card { background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:16px 18px; }
  .stat-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:6px; }
  .stat-value { font-size:28px; font-weight:700; letter-spacing:-0.5px; font-variant-numeric:tabular-nums; }
  .stat-sub { font-size:12px; color:var(--text-dim); margin-top:4px; }

  .donut-card { background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:20px 24px; margin-bottom:20px; }
  .donut-title { font-size:16px; font-weight:700; margin-bottom:14px; }
  .donut-wrap { display:grid; grid-template-columns:320px 1fr; gap:28px; align-items:center; }
  @media(max-width:720px) { .donut-wrap { grid-template-columns:1fr; } }
  .donut-chart { position:relative; height:260px; }
  .donut-legend { display:flex; flex-direction:column; gap:12px; }
  .legend-row { display:flex; align-items:center; gap:10px; }
  .legend-swatch { width:14px; height:14px; border-radius:3px; }
  .legend-name { flex:1; font-weight:600; font-size:14px; }
  .legend-val { font-variant-numeric:tabular-nums; color:var(--text-dim); }

  .chart-card { background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:20px 24px; margin-bottom:20px; }
  .chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px; }
  .chart-title { font-size:16px; font-weight:700; }
  .chart-wrap { position:relative; height:340px; }
  .controls-row { display:flex; gap:14px; flex-wrap:wrap; }
  .btn-group { display:flex; gap:6px; }
  .btn-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); align-self:center; margin-right:4px; }
  .btn { background:transparent; border:1px solid var(--card-border); color:var(--text-dim); padding:6px 12px; border-radius:6px; font-size:12px; cursor:pointer; font-weight:500; }
  .btn:hover { border-color:var(--text-dim); color:var(--text); }
  .btn.active { background:var(--accent); border-color:var(--accent); color:var(--bg); font-weight:600; }
  .date-input { background:transparent; border:1px solid var(--card-border); color:var(--text); padding:6px 10px; border-radius:6px; font-size:12px; font-family:inherit; }
  .date-input::-webkit-calendar-picker-indicator { filter:invert(0.7); }
  .date-sep { color:var(--text-dim); font-size:12px; align-self:center; }
</style>
</head>

    <div>
      <div class="title">CB Source — Delivered status</div>

  <div class="scope-note" id="scope"></div>

  <div class="chart-card" style="padding:14px 20px; margin-bottom:16px;">
    <div class="controls-row" style="justify-content:flex-start;">
      <div class="btn-group">

        <button class="btn" data-window="7">7d</button>
        <button class="btn" data-window="30">30d</button>

      <div class="btn-group">

        <input type="date" id="date-from" class="date-input">
        <span class="date-sep">→</span>

      </div>
    </div>
  </div>

  <div class="stats-row" id="stats"></div>

  <div class="donut-card">
    <div class="donut-title">Delivered vs Not delivered — first-time CB orders</div>
    <div class="donut-wrap">
      <div class="donut-chart"><canvas id="donut"></canvas></div>
      <div class="donut-legend" id="donut-legend"></div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">Daily breakdown (stacked)</div>
    </div>
    <div class="chart-wrap"><canvas id="trend"></canvas></div>
  </div>
</div>

<script>
(function() {
  const data = JSON.parse(document.getElementById('dv-data').textContent);
  const fmtNum = n => (n || 0).toLocaleString('en-US');
  const COLORS = { delivered:'#4ade80', not_delivered:'#ef4444', unknown:'#8b8fa3' };

  document.getElementById('subtitle').textContent =
    `${data.window_start} → ${data.window_end}  ·  coverage: ${Math.round(data.coverage.match_rate*100)}%  ·  ${data.notice}`;

  document.getElementById('scope').innerHTML =
    `<strong>Scope:</strong> ${data.scope}. Rebill + upsell CBs are excluded — the question "did they receive it?" only applies to first-time cream purchases where the delivery is the predictive signal.`;

  // Full 90d baseline (for donut proportional scaling on mock data)
  const baseline = data.totals.total || 1;

  // Chart instances (rebuilt on each window change)
  let trendChart = null;
  let donutChart = null;

  function renderAll(start, end) {
    const labels = data.dates.slice(start, end+1);
    const dSeries = data.series.delivered.slice(start, end+1);
    const ndSeries = data.series.not_delivered.slice(start, end+1);
    const uSeries = data.series.unknown.slice(start, end+1);
    const dSum = dSeries.reduce((a,b)=>a+b, 0);
    const ndSum = ndSeries.reduce((a,b)=>a+b, 0);
    const uSum = uSeries.reduce((a,b)=>a+b, 0);
    const totSum = dSum + ndSum + uSum;
    const dPct = totSum ? dSum / totSum : 0;
    const ndPct = totSum ? ndSum / totSum : 0;
    const uPct = totSum ? uSum / totSum : 0;
    const winLabel = `window: ${data.dates[start]} → ${data.dates[end]} · ${labels.length}d`;

    // Stats
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="stat-label">Delivered</div><div class="stat-value" style="color:${COLORS.delivered};">${fmtNum(dSum)}</div><div class="stat-sub">${Math.round(dPct*100)}% — customer got product, still disputed · ${winLabel}</div></div>
      <div class="stat-card"><div class="stat-label">Not delivered</div><div class="stat-value" style="color:${COLORS.not_delivered};">${fmtNum(ndSum)}</div><div class="stat-sub">${Math.round(ndPct*100)}% — preventable via shipping fix · ${winLabel}</div></div>
      <div class="stat-card"><div class="stat-label">Unknown</div><div class="stat-value" style="color:${COLORS.unknown};">${fmtNum(uSum)}</div><div class="stat-sub">${Math.round(uPct*100)}% — no tracking data · ${winLabel}</div></div>
      <div class="stat-card"><div class="stat-label">Total first-time CBs</div><div class="stat-value">${fmtNum(totSum)}</div><div class="stat-sub">${winLabel}</div></div>
    `;

    // Donut — scale by_status_detail proportionally to window fraction (mock data only; real pipeline will have daily per-status)
    const scale = baseline ? totSum / baseline : 1;
    const det = data.by_status_detail.map(d => ({ ...d, cbs_in_window: Math.round(d.cbs * scale) }));
    const detTotal = det.reduce((a,d) => a + d.cbs_in_window, 0) || 1;

    if (donutChart) donutChart.destroy();
    donutChart = new Chart(document.getElementById('donut').getContext('2d'), {
      type:'doughnut',
      data:{
        labels: det.map(d => d.status),
        datasets:[{ data: det.map(d => d.cbs_in_window), backgroundColor: det.map(d => d.color), borderWidth: 0 }],
      },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label:(c)=>{ const d=det[c.dataIndex]; return `${d.status}: ${fmtNum(d.cbs_in_window)} (${Math.round(d.cbs_in_window/detTotal*100)}%)`; } } } } },
    });
    document.getElementById('donut-legend').innerHTML = det.map(d => `
      <div class="legend-row">
        <div class="legend-swatch" style="background:${d.color}"></div>
        <div class="legend-name">${d.status}</div>
        <div class="legend-val">${fmtNum(d.cbs_in_window)} · ${Math.round(d.cbs_in_window/detTotal*100)}%</div>
      </div>
    `).join('');

    // Trend stacked bar
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(document.getElementById('trend').getContext('2d'), {
      type:'bar',
      data:{ labels, datasets:[
        { label:'Delivered', data:dSeries, backgroundColor:COLORS.delivered, stack:'s' },
        { label:'Not delivered', data:ndSeries, backgroundColor:COLORS.not_delivered, stack:'s' },
        { label:'Unknown', data:uSeries, backgroundColor:COLORS.unknown, stack:'s' },
      ]},
      options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index', intersect:false},
        scales:{ x:{stacked:true, ticks:{color:'#8b8fa3', maxTicksLimit:12}, grid:{display:false}}, y:{stacked:true, beginAtZero:true, ticks:{color:'#8b8fa3'}, grid:{color:'rgba(255,255,255,0.05)'}} },
        plugins:{ legend:{labels:{color:'#e4e6eb'}} },
      },
    });
  }

  // Window/date controls
  let currentWindow = 90;
  const n = data.dates.length;
  const dateFrom = document.getElementById('date-from');
  const dateTo = document.getElementById('date-to');
  dateFrom.min = data.dates[0]; dateFrom.max = data.dates[n-1];
  dateTo.min = data.dates[0]; dateTo.max = data.dates[n-1];

  function sync() {
    let s = Math.max(0, n - currentWindow), e = n-1;
    dateFrom.value = data.dates[s]; dateTo.value = data.dates[e];
    renderAll(s, e);
  }
  document.querySelectorAll('.btn[data-window]').forEach(btn => btn.addEventListener('click', () => {
    currentWindow = parseInt(btn.dataset.window, 10);
    document.querySelectorAll('.btn[data-window]').forEach(b => b.classList.toggle('active', b === btn));
    sync();
  }));
  [dateFrom, dateTo].forEach(el => el.addEventListener('change', () => {
    if (!dateFrom.value || !dateTo.value || dateFrom.value > dateTo.value) return;
    const s = data.dates.indexOf(dateFrom.value), e = data.dates.indexOf(dateTo.value);
    if (s < 0 || e < 0) return;
    document.querySelectorAll('.btn[data-window]').forEach(b => b.classList.remove('active'));
    renderAll(s, e);
  }));
  sync();
})();
</script>
