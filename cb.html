<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-border: #2a2d3a;
    --text: #e4e6eb;
    --text-dim: #8b8fa3;
    --accent: #4ade80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    padding: 40px 24px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
  }
  .title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .back-link {
    font-size: 13px; color: var(--text-dim); text-decoration: none;
    padding: 8px 14px; border: 1px solid var(--card-border); border-radius: 8px;
    transition: border-color 0.15s;
  }
  .back-link:hover { border-color: var(--accent); color: var(--text); }

  .tabs {
    display: flex; gap: 4px; margin-bottom: 20px;
    border-bottom: 1px solid var(--card-border); padding-bottom: 0;
  }
  .tab {
    font-size: 13px; font-weight: 600; text-decoration: none; color: var(--text-dim);
    padding: 10px 18px; border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s; margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 16px 18px;
  }
  .stat-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim); margin-bottom: 6px;
  }
  .stat-value { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
  .stat-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .stat-plats {
    font-size: 10px; color: var(--text-dim); margin-top: 8px;
    padding-top: 6px; border-top: 1px solid var(--card-border);
    display: flex; flex-wrap: wrap; gap: 4px 10px; line-height: 1.5;
  }
  .stat-plats .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

  .chart-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 20px 24px 24px; margin-bottom: 20px;
  }
  .chart-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
  }
  .chart-title { font-size: 16px; font-weight: 700; }
  .btn-group { display: flex; gap: 6px; }
  .btn {
    background: transparent; border: 1px solid var(--card-border); color: var(--text-dim);
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    transition: all 0.15s; font-weight: 500;
  }
  .btn:hover { border-color: var(--text-dim); color: var(--text); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
  .btn-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); align-self: center; margin-right: 4px; }
  .date-input {
    background: transparent; border: 1px solid var(--card-border); color: var(--text);
    padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
    font-family: inherit;
  }
  .date-input:hover { border-color: var(--text-dim); }
  .date-input:focus { outline: none; border-color: var(--accent); }
  .date-input::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
  .date-sep { color: var(--text-dim); font-size: 12px; align-self: center; }

  .chart-wrap { position: relative; height: 420px; }

  .platform-legend {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px; margin-top: 20px;
  }
  .plat-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--bg); border: 1px solid var(--card-border); border-radius: 8px;
    font-size: 13px; cursor: pointer; transition: opacity 0.15s, border-color 0.15s;
    user-select: none;
  }
  .plat-row:hover { border-color: var(--text-dim); }
  .plat-row.disabled { opacity: 0.35; }
  .plat-row.disabled .plat-swatch { background: transparent !important; border: 1px solid var(--text-dim); }
  .plat-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .plat-name { flex: 1; font-weight: 600; }
  .plat-count { color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .plat-kind {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
    padding: 2px 6px; border-radius: 4px; margin-left: 4px;
  }
  .plat-kind.fight { background: rgba(74,222,128,0.15); color: var(--accent); }
  .plat-kind.auto  { background: rgba(139,143,163,0.18); color: var(--text-dim); }

  .footer-meta {
    margin-top: 16px; font-size: 11px; color: var(--text-dim); text-align: center;
  }
</style>
</head>

    'Payarc':         '#f59e0b',
    'Aurora':         '#ef4444',
    'EMS':            '#06b6d4',
    'Kount':          '#c2410c',
  };
  const FIGHTABLE = new Set(['Paypal','Stripe Dispute','Payarc','Aurora']);
  const AUTO      = new Set(['Kount','EMS','Stripe by RDR']);
  const colorFor = p => PLATFORM_COLORS[p] || '#94a3b8';
  const kindOf   = p => FIGHTABLE.has(p) ? 'fight' : (AUTO.has(p) ? 'auto' : 'other');

  const visiblePlatforms = data.platforms.filter(p => p && p !== '(blank)');
  const partialDatesSet = new Set(data.partial_dates || []);

  // State
  let currentWindow = 90;
  let currentFilter = 'all';   // 'all' | 'fight' | 'auto'
  let customRange = null;      // {from, to} — overrides currentWindow
  const hiddenByLegend = new Set();

  function getSliceIndices() {
    const n = data.dates.length;
    if (customRange) {
      let start = 0;
      for (let i = 0; i < n; i++) { if (data.dates[i] >= customRange.from) { start = i; break; } if (i === n-1) start = n; }
      let end = n - 1;
      for (let i = n - 1; i >= 0; i--) { if (data.dates[i] <= customRange.to) { end = i; break; } if (i === 0) end = -1; }
      if (start > end) { start = 0; end = -1; }
      return { start, end };
    }
    return { start: Math.max(0, n - currentWindow), end: n - 1 };
  }

  // Subtitle — flag partial days explicitly
  const partialNote = partialDatesSet.size
    ? `  ·  ⚠ ${[...partialDatesSet].join(', ')} is partial (sheet still being updated — shown at 50% opacity)`
    : '';
  document.getElementById('subtitle').textContent =
    `${data.window_start} → ${data.window_end}  ·  source: Daily CB Analysis 3 › Analysis of dispute  ·  updated ${data.generated_at}${partialNote}`;

  const fmtUSD = n => '$' + (n || 0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  const fmtNum = n => (n || 0).toLocaleString('en-US');

  // Custom plugin: draws stacked-total number above each bar (visible datasets only)
  const totalOnTopPlugin = {
    id: 'totalOnTop',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      const datasets = chart.data.datasets;
      const barCount = chart.data.labels.length;
      ctx.save();
      ctx.font = '600 10px -apple-system, BlinkMacSystemFont, Inter, sans-serif';
      ctx.fillStyle = '#e4e6eb';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      for (let idx = 0; idx < barCount; idx++) {
        let total = 0, topY = Infinity, x = null, barWidth = 0;
        for (let di = 0; di < datasets.length; di++) {
          // Skip datasets hidden via dataset.hidden = true (filter/legend toggles)
          if (datasets[di].hidden) continue;
          const meta = chart.getDatasetMeta(di);
          if (meta.hidden) continue;
          const el = meta.data[idx];
          if (!el) continue;
          const v = datasets[di].data[idx] || 0;
          if (v === 0) continue;
          total += v;
          if (x === null) { x = el.x; barWidth = el.width || 0; }
          if (el.y < topY) topY = el.y;
        }
        if (total > 0 && x !== null && isFinite(topY) && barWidth >= 18) {
          ctx.fillText(String(total), x, topY - 4);
        }
      }
      ctx.restore();
    },
  };

  // Build chart — per-bar bg color dims partial days to 50% opacity
  const ctx = document.getElementById('cb-chart').getContext('2d');
  const withAlpha = (hex, alphaHex) => hex + alphaHex;
  const datasets = visiblePlatforms.map(p => ({
    label: p,
    data: data.series[p].slice(),
    backgroundColor: (c) => {
      const label = c.chart.data.labels[c.dataIndex];
      return partialDatesSet.has(label) ? withAlpha(colorFor(p), '80') : colorFor(p);
    },
    borderWidth: 0,
    stack: 'cb',
    hidden: false,
  }));
  const chart = new Chart(ctx, {
    type: 'bar',
    plugins: [totalOnTopPlugin],
    data: { labels: data.dates.slice(), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      layout: { padding: { top: 18 } },  // room for total labels
      scales: {
        x: { stacked: true, ticks: { color: '#8b8fa3', maxRotation: 0, autoSkip: true, maxTicksLimit: 12 }, grid: { display: false } },
        y: { stacked: true, beginAtZero: true, ticks: { color: '#8b8fa3' }, grid: { color: 'rgba(255,255,255,0.05)' } },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1d27', borderColor: '#2a2d3a', borderWidth: 1,
          titleColor: '#e4e6eb', bodyColor: '#e4e6eb', padding: 10,
          callbacks: {
            footer: items => 'Total: ' + items.reduce((s, it) => s + (it.parsed.y || 0), 0),
          },
        },
      },
    },
  });

  // Build legend
  const legendEl = document.getElementById('platform-legend');
  legendEl.innerHTML = visiblePlatforms.map(p => {
    const k = kindOf(p);
    const kindLabel = k === 'fight' ? 'FIGHT' : (k === 'auto' ? 'AUTO' : '');
    return `
      <div class="plat-row" data-platform="${p}">
        <div class="plat-swatch" style="background:${colorFor(p)}"></div>
        <div class="plat-name">${p}</div>
        ${kindLabel ? `<span class="plat-kind ${k}">${kindLabel}</span>` : ''}
        <div class="plat-count" data-count-for="${p}">0</div>
      </div>
    `;
  }).join('');

  function isPlatformActive(p) {
    if (hiddenByLegend.has(p)) return false;
    const k = kindOf(p);
    if (currentFilter === 'fight' && k !== 'fight') return false;
    if (currentFilter === 'auto'  && k !== 'auto')  return false;
    return true;
  }

  function recompute() {
    const { start: sliceStart, end: sliceEnd } = getSliceIndices();
    const lenInWindow = Math.max(0, sliceEnd - sliceStart + 1);
    const slicedLabels = data.dates.slice(sliceStart, sliceEnd + 1);
    chart.data.labels = slicedLabels;

    const windowLabel = customRange
      ? `${customRange.from} → ${customRange.to}`
      : `${currentWindow}d`;

    const totalsInWindow = {};
    let fightCount = 0, autoCount = 0, fightAmt = 0, autoAmt = 0;

    visiblePlatforms.forEach((p, i) => {
      const ds = chart.data.datasets[i];
      ds.data = data.series[p].slice(sliceStart, sliceEnd + 1);
      const sumCount = ds.data.reduce((a, b) => a + b, 0);
      totalsInWindow[p] = sumCount;
      ds.hidden = !isPlatformActive(p);

      const totalForP = data.totals_by_platform[p] || 0;
      const amtForP = data.amounts_by_platform[p] || 0;
      const amtInWindow = totalForP > 0 ? amtForP * (sumCount / totalForP) : 0;
      if (!ds.hidden) {
        const k = kindOf(p);
        if (k === 'fight') { fightCount += sumCount; fightAmt += amtInWindow; }
        if (k === 'auto')  { autoCount  += sumCount; autoAmt  += amtInWindow; }
      }
    });

    chart.update();

    visiblePlatforms.forEach(p => {
      const row = legendEl.querySelector(`[data-platform="${p}"]`);
      if (!row) return;
      const countEl = row.querySelector('[data-count-for]');
      countEl.textContent = fmtNum(totalsInWindow[p] || 0);
      const inactive = !isPlatformActive(p);
      row.classList.toggle('disabled', inactive);
    });

    const visibleTotal = fightCount + autoCount;
    const visibleAmt   = fightAmt + autoAmt;
    const fightPerDay = lenInWindow > 0 ? fightCount / lenInWindow : 0;
    const autoPerDay  = lenInWindow > 0 ? autoCount / lenInWindow : 0;

    // Per-platform /day breakdown (only visible + active platforms)
    const shortName = { 'Stripe Dispute': 'Stripe', 'Stripe by RDR': 'Stripe RDR' };
    const fightPlatsHTML = [];
    const autoPlatsHTML = [];
    visiblePlatforms.forEach(p => {
      if (!isPlatformActive(p)) return;
      const cnt = totalsInWindow[p] || 0;
      if (cnt === 0) return;
      const perDay = lenInWindow > 0 ? cnt / lenInWindow : 0;
      const perDayStr = perDay >= 10 ? String(Math.round(perDay)) : perDay.toFixed(1);
      const name = shortName[p] || p;
      const html = `<span><span class="dot" style="background:${colorFor(p)}"></span>${name} ${perDayStr}</span>`;
      if (kindOf(p) === 'fight') fightPlatsHTML.push(html);
      if (kindOf(p) === 'auto')  autoPlatsHTML.push(html);
    });

    const fightPlatsLine = fightPlatsHTML.length
      ? `<div class="stat-plats">${fightPlatsHTML.join('')}</div>` : '';
    const autoPlatsLine = autoPlatsHTML.length
      ? `<div class="stat-plats">${autoPlatsHTML.join('')}</div>` : '';

    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total CBs</div><div class="stat-value">${fmtNum(visibleTotal)}</div><div class="stat-sub">${fmtUSD(visibleAmt)} · ${windowLabel}</div></div>
      <div class="stat-card"><div class="stat-label">Fightable</div><div class="stat-value">${fmtNum(fightCount)}</div><div class="stat-sub">${fmtUSD(fightAmt)}</div></div>
      <div class="stat-card"><div class="stat-label">Auto-refund (RDR)</div><div class="stat-value">${fmtNum(autoCount)}</div><div class="stat-sub">${fmtUSD(autoAmt)}</div></div>
      <div class="stat-card"><div class="stat-label">Fightable / day</div><div class="stat-value">${fmtNum(Math.round(fightPerDay))}</div><div class="stat-sub">avg over ${lenInWindow}d</div>${fightPlatsLine}</div>
      <div class="stat-card"><div class="stat-label">Auto-refund / day</div><div class="stat-value">${fmtNum(Math.round(autoPerDay))}</div><div class="stat-sub">avg over ${lenInWindow}d</div>${autoPlatsLine}</div>
    `;

    document.getElementById('footer-meta').textContent =
      `window: ${windowLabel} · filter: ${currentFilter} · ${lenInWindow} daily buckets · generated ${data.generated_at}`;
  }

  // Date inputs
  const dateFromEl = document.getElementById('date-from');
  const dateToEl = document.getElementById('date-to');
  const firstDate = data.dates[0];
  const lastDate = data.dates[data.dates.length - 1];
  dateFromEl.min = firstDate; dateFromEl.max = lastDate;
  dateToEl.min = firstDate; dateToEl.max = lastDate;

  function syncDateInputsToPreset() {
    const { start, end } = getSliceIndices();
    dateFromEl.value = data.dates[start] || '';
    dateToEl.value = data.dates[end] || '';
  }

  // Window buttons — clear custom range
  document.querySelectorAll('.btn[data-window]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentWindow = parseInt(btn.dataset.window, 10);
      customRange = null;
      document.querySelectorAll('.btn[data-window]').forEach(b => b.classList.toggle('active', b === btn));
      syncDateInputsToPreset();
      recompute();
    });
  });

  function applyCustomRange() {
    const from = dateFromEl.value;
    const to = dateToEl.value;
    if (!from || !to) return;
    if (from > to) return;
    customRange = { from, to };
    document.querySelectorAll('.btn[data-window]').forEach(b => b.classList.remove('active'));
    recompute();
  }
  dateFromEl.addEventListener('change', applyCustomRange);
  dateToEl.addEventListener('change', applyCustomRange);

  // Filter buttons
  document.querySelectorAll('.btn[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.btn[data-filter]').forEach(b => b.classList.toggle('active', b === btn));
      recompute();
    });
  });

  // Legend click → toggle platform
  legendEl.querySelectorAll('.plat-row').forEach(row => {
    row.addEventListener('click', () => {
      const p = row.dataset.platform;
      if (hiddenByLegend.has(p)) hiddenByLegend.delete(p);
      else hiddenByLegend.add(p);
      recompute();
    });
  });

  syncDateInputsToPreset();
  recompute();
})();
</script>
</body>
</html>
