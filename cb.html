<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-border: #2a2d3a;
    --text: #e4e6eb;
    --text-dim: #8b8fa3;
    --accent: #4ade80;
    --blue: #3b82f6;
    --orange: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
    --cyan: #06b6d4;
    --pink: #ec4899;
    --gray: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    padding: 40px 24px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
  }
  .title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .back-link {
    font-size: 13px; color: var(--text-dim); text-decoration: none;
    padding: 8px 14px; border: 1px solid var(--card-border); border-radius: 8px;
    transition: border-color 0.15s;
  }
  .back-link:hover { border-color: var(--accent); color: var(--text); }

  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 16px 18px;
  }
  .stat-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim); margin-bottom: 6px;
  }
  .stat-value { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .stat-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .chart-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 20px 24px 24px; margin-bottom: 20px;
  }
  .chart-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .chart-title { font-size: 16px; font-weight: 700; }
  .chart-controls { display: flex; gap: 6px; }
  .btn {
    background: transparent; border: 1px solid var(--card-border); color: var(--text-dim);
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--text-dim); color: var(--text); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }

  .chart-wrap { position: relative; height: 420px; }

  .platform-legend {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px; margin-top: 20px;
  }
  .plat-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--bg); border: 1px solid var(--card-border); border-radius: 8px;
    font-size: 13px;
  }
  .plat-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .plat-name { flex: 1; font-weight: 600; }
  .plat-count { color: var(--text-dim); font-variant-numeric: tabular-nums; }

  .footer-meta {
    margin-top: 16px; font-size: 11px; color: var(--text-dim); text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div class="title">Chargebacks</div>
      <div class="subtitle" id="subtitle">Loading…</div>
    </div>
    <a href="hub.html" class="back-link">← Hub</a>
  </div>

  <div class="stats-row" id="stats"></div>

  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">CBs per day, stacked by Platform</div>
      <div class="chart-controls">
        <button class="btn" data-window="7">7d</button>
        <button class="btn" data-window="30">30d</button>
        <button class="btn active" data-window="90">90d</button>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="cb-chart"></canvas></div>
    <div class="platform-legend" id="platform-legend"></div>
    <div class="footer-meta" id="footer-meta"></div>
  </div>
</div>

<script>
(function() {
  const raw = document.getElementById('cb-data').textContent;
  const data = JSON.parse(raw);

  // Platform colors — stable assignment
  const PLATFORM_COLORS = {
    'Paypal':         '#3b82f6',  // blue
    'Stripe Dispute': '#a78bfa',  // purple
    'Stripe by RDR':  '#ec4899',  // pink
    'Payarc':         '#f59e0b',  // orange
    'Aurora':         '#ef4444',  // red
    'EMS':            '#06b6d4',  // cyan
    'Kount':          '#6b7280',  // gray (least fightable)
  };
  function colorFor(p) { return PLATFORM_COLORS[p] || '#94a3b8'; }

  // Subtitle + stats
  document.getElementById('subtitle').textContent =
    `${data.window_start} → ${data.window_end}  ·  source: Daily CB Analysis 3 › Analysis of dispute  ·  updated ${data.generated_at}`;

  const fmtUSD = n => '$' + (n || 0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  const fmtNum = n => (n || 0).toLocaleString('en-US');

  const statsEl = document.getElementById('stats');
  const paypal = data.totals_by_platform['Paypal'] || 0;
  const stripe = (data.totals_by_platform['Stripe Dispute'] || 0) + (data.totals_by_platform['Stripe by RDR'] || 0);
  const fightable = ['Paypal','Stripe Dispute','Payarc','Aurora'].reduce((s,p) => s + (data.totals_by_platform[p]||0), 0);
  const rdrAuto = ['Kount','EMS','Stripe by RDR'].reduce((s,p) => s + (data.totals_by_platform[p]||0), 0);

  statsEl.innerHTML = `
    <div class="stat-card"><div class="stat-label">Total CBs (90d)</div><div class="stat-value">${fmtNum(data.grand_total_count)}</div><div class="stat-sub">${fmtUSD(data.grand_total_amount)}</div></div>
    <div class="stat-card"><div class="stat-label">Fightable</div><div class="stat-value">${fmtNum(fightable)}</div><div class="stat-sub">PayPal + Stripe + Payarc + Aurora</div></div>
    <div class="stat-card"><div class="stat-label">Auto-refund (RDR)</div><div class="stat-value">${fmtNum(rdrAuto)}</div><div class="stat-sub">Kount + EMS + Stripe RDR</div></div>
    <div class="stat-card"><div class="stat-label">Daily avg (90d)</div><div class="stat-value">${fmtNum(Math.round(data.grand_total_count / data.window_days))}</div><div class="stat-sub">all platforms</div></div>
  `;

  // Legend
  const legendEl = document.getElementById('platform-legend');
  legendEl.innerHTML = data.platforms.map(p => `
    <div class="plat-row">
      <div class="plat-swatch" style="background:${colorFor(p)}"></div>
      <div class="plat-name">${p}</div>
      <div class="plat-count">${fmtNum(data.totals_by_platform[p])}</div>
    </div>
  `).join('');

  // Footer
  document.getElementById('footer-meta').textContent =
    `${data.window_days} days · ${data.dates.length} daily buckets · generated ${data.generated_at}`;

  // Chart
  const ctx = document.getElementById('cb-chart').getContext('2d');
  const datasets = data.platforms.map(p => ({
    label: p,
    data: data.series[p],
    backgroundColor: colorFor(p),
    borderColor: colorFor(p),
    borderWidth: 0,
    stack: 'cb',
  }));

  let currentWindow = 90;
  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.dates,
      datasets: datasets,
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          stacked: true,
          ticks: { color: '#8b8fa3', maxRotation: 0, autoSkip: true, maxTicksLimit: 12 },
          grid: { display: false },
        },
        y: {
          stacked: true, beginAtZero: true,
          ticks: { color: '#8b8fa3' },
          grid: { color: 'rgba(255,255,255,0.05)' },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1d27', borderColor: '#2a2d3a', borderWidth: 1,
          titleColor: '#e4e6eb', bodyColor: '#e4e6eb', padding: 10,
          callbacks: {
            footer: (items) => {
              const total = items.reduce((s, it) => s + (it.parsed.y || 0), 0);
              return 'Total: ' + total;
            },
          },
        },
      },
    },
  });

  // Window buttons
  document.querySelectorAll('.btn[data-window]').forEach(btn => {
    btn.addEventListener('click', () => {
      const w = parseInt(btn.dataset.window, 10);
      currentWindow = w;
      document.querySelectorAll('.btn[data-window]').forEach(b => b.classList.toggle('active', b === btn));
      const n = data.dates.length;
      const sliceStart = Math.max(0, n - w);
      chart.data.labels = data.dates.slice(sliceStart);
      chart.data.datasets.forEach((ds, i) => {
        ds.data = data.series[data.platforms[i]].slice(sliceStart);
      });
      chart.update();
    });
  });
})();
</script>
</body>
</html>
