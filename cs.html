<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWP — Customer Support</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-border: #2a2d3a;
    --text: #e4e6eb;
    --text-dim: #8b8fa3;
    --accent: #4ade80;
    --blue: #3b82f6;
    --orange: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    padding: 40px 24px;
  }
  .container { max-width: 1400px; margin: 0 auto; }
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 20px; flex-wrap: wrap; gap: 16px;
  }
  .title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .back-link {
    font-size: 13px; color: var(--text-dim); text-decoration: none;
    padding: 8px 14px; border: 1px solid var(--card-border); border-radius: 8px;
    transition: border-color 0.15s;
  }
  .back-link:hover { border-color: var(--accent); color: var(--text); }

  .filter-bar {
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    margin-bottom: 20px; padding: 14px 18px;
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px;
  }
  .btn-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim);
  }
  .btn-group { display: flex; gap: 6px; }
  .btn {
    background: transparent; border: 1px solid var(--card-border); color: var(--text-dim);
    padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
    transition: all 0.15s; font-weight: 600; font-family: inherit;
  }
  .btn:hover { border-color: var(--text-dim); color: var(--text); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .date-input {
    background: transparent; border: 1px solid var(--card-border); color: var(--text);
    padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
    font-family: inherit;
  }
  .date-input:hover { border-color: var(--text-dim); }
  .date-input:focus { outline: none; border-color: var(--accent); }
  .date-input::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
  .date-sep { color: var(--text-dim); font-size: 12px; }

  .kpi-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px; margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 18px 20px;
  }
  .kpi-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums; }
  .kpi-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .chart-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 20px 24px 24px; margin-bottom: 20px;
  }
  .chart-header { display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .chart-title { font-size: 16px; font-weight: 700; }
  .chart-wrap { position: relative; height: 380px; }

  .table-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 20px 24px; overflow-x: auto;
  }
  .table-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px;
    font-variant-numeric: tabular-nums; }
  th, td { padding: 8px 8px; text-align: right; white-space: nowrap;
    border-bottom: 1px solid rgba(255,255,255,0.04); }
  th:first-child, td:first-child { text-align: left; }
  th {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-dim); padding: 10px 8px;
    position: sticky; top: 0; background: var(--card);
    cursor: pointer; user-select: none;
  }
  th:hover { color: var(--text); }
  th.sorted { color: var(--accent); }
  td.agent-name { font-weight: 600; }
  td.total-col { font-weight: 700; color: var(--text); }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .heat-0 { color: rgba(228,230,235,0.25); }
  .heat-1 { color: rgba(228,230,235,0.55); }
  .heat-2 { color: var(--text); }
  .heat-3 { color: var(--accent); font-weight: 600; }

  .footer-meta { margin-top: 16px; font-size: 11px;
    color: var(--text-dim); text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div class="title">Customer Support</div>
      <div class="subtitle" id="subtitle">Loading…</div>
    </div>
    <a href="hub.html" class="back-link">← Hub</a>
  </div>

  <div class="filter-bar">
    <span class="btn-label">Window</span>
    <div class="btn-group">
      <button class="btn" data-preset="7">7d</button>
      <button class="btn active" data-preset="30">30d</button>
      <button class="btn" data-preset="90">90d</button>
    </div>
    <span class="btn-label" style="margin-left: 8px;">Or pick range</span>
    <input type="date" class="date-input" id="date-start">
    <span class="date-sep">→</span>
    <input type="date" class="date-input" id="date-end">
    <button class="btn" id="apply-range">Apply</button>
  </div>

  <div class="kpi-row" id="kpi-row"></div>

  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">Daily customer messages &amp; new tickets</div>
    </div>
    <div class="chart-wrap"><canvas id="volume-chart"></canvas></div>
  </div>

  <div class="table-card">
    <div class="table-title">Replies per agent per day (click a column to sort)</div>
    <div id="agent-table"></div>
  </div>

  <div class="footer-meta" id="footer">–</div>
</div>

<script>
let CS_DATA = null;
let chart = null;
let sortCol = 'total';
let sortDir = 'desc';
// Active date window (indices into CS_DATA.days)
let winStart = 0;
let winEnd = 0;

async function load() {
  const res = await fetch('cs_data.json?t=' + Date.now());
  CS_DATA = await res.json();
  // Default: last 30 days of whatever we fetched
  const totalDays = CS_DATA.days.length;
  winEnd = totalDays - 1;
  winStart = Math.max(0, totalDays - 30);
  syncDateInputs();
  wireEvents();
  render();
}

function fmt(n) { return (n || 0).toLocaleString('en-US'); }

function syncDateInputs() {
  document.getElementById('date-start').value = CS_DATA.days[winStart];
  document.getElementById('date-end').value = CS_DATA.days[winEnd];
}

function wireEvents() {
  document.querySelectorAll('[data-preset]').forEach(btn => {
    btn.addEventListener('click', () => {
      const days = parseInt(btn.getAttribute('data-preset'), 10);
      const total = CS_DATA.days.length;
      winEnd = total - 1;
      winStart = Math.max(0, total - days);
      document.querySelectorAll('[data-preset]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      syncDateInputs();
      render();
    });
  });
  document.getElementById('apply-range').addEventListener('click', () => {
    const s = document.getElementById('date-start').value;
    const e = document.getElementById('date-end').value;
    const si = CS_DATA.days.indexOf(s);
    const ei = CS_DATA.days.indexOf(e);
    if (si < 0 || ei < 0 || si > ei) {
      alert('Pick two dates within ' + CS_DATA.days[0] + ' → ' + CS_DATA.days[CS_DATA.days.length - 1]);
      return;
    }
    winStart = si;
    winEnd = ei;
    document.querySelectorAll('[data-preset]').forEach(b => b.classList.remove('active'));
    render();
  });
}

function windowSlice() {
  const days = CS_DATA.days.slice(winStart, winEnd + 1);
  const cust = CS_DATA.customer_msgs_per_day.slice(winStart, winEnd + 1);
  const tix = CS_DATA.new_tickets_per_day.slice(winStart, winEnd + 1);
  return { days, cust, tix };
}

function renderKpis() {
  const { days, cust, tix } = windowSlice();
  const sumCust = cust.reduce((a, b) => a + b, 0);
  const sumTix = tix.reduce((a, b) => a + b, 0);
  let sumReplies = 0;
  let activeAgents = 0;
  for (const a of CS_DATA.agents) {
    let t = 0;
    for (const d of days) t += a.per_day[d] || 0;
    if (t > 0) activeAgents++;
    sumReplies += t;
  }
  const n = days.length;
  const row = document.getElementById('kpi-row');
  row.innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Customer Messages</div>
      <div class="kpi-value">${fmt(sumCust)}</div>
      <div class="kpi-sub">${fmt(Math.round(sumCust / n))}/day avg</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">New Tickets</div>
      <div class="kpi-value">${fmt(sumTix)}</div>
      <div class="kpi-sub">${fmt(Math.round(sumTix / n))}/day avg</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Agent Replies</div>
      <div class="kpi-value">${fmt(sumReplies)}</div>
      <div class="kpi-sub">${fmt(Math.round(sumReplies / n))}/day avg · ${activeAgents} agents</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Reply : Inbound</div>
      <div class="kpi-value">${(sumReplies / Math.max(1, sumCust)).toFixed(2)}×</div>
      <div class="kpi-sub">replies per inbound msg</div>
    </div>
  `;
}

function renderChart() {
  const { days, cust, tix } = windowSlice();
  const ctx = document.getElementById('volume-chart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    data: {
      labels: days.map(d => d.slice(5)),
      datasets: [
        {
          type: 'bar',
          label: 'Customer messages',
          data: cust,
          backgroundColor: 'rgba(59,130,246,0.55)',
          borderColor: 'rgba(59,130,246,1)',
          borderWidth: 1,
          yAxisID: 'y',
        },
        {
          type: 'line',
          label: 'New tickets',
          data: tix,
          borderColor: 'rgba(245,158,11,1)',
          backgroundColor: 'rgba(245,158,11,0.15)',
          tension: 0.25, pointRadius: 3, borderWidth: 2,
          yAxisID: 'y',
        },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#e4e6eb', font: { size: 12 } } },
        tooltip: { backgroundColor: '#1a1d27', borderColor: '#2a2d3a', borderWidth: 1 },
      },
      scales: {
        x: { ticks: { color: '#8b8fa3', maxRotation: 0, autoSkipPadding: 16 },
             grid: { color: 'rgba(255,255,255,0.03)' } },
        y: { beginAtZero: true, ticks: { color: '#8b8fa3' },
             grid: { color: 'rgba(255,255,255,0.05)' } },
      },
    },
  });
}

function renderTable() {
  const { days } = windowSlice();
  const winDays = days.length;
  // Build agents with windowed totals + avg/cal + avg/active
  const agents = CS_DATA.agents.map(a => {
    let total = 0;
    let activeDays = 0;
    for (const d of days) {
      const v = a.per_day[d] || 0;
      total += v;
      if (v > 0) activeDays++;
    }
    return {
      name: a.name,
      total,
      avg_cal: total / winDays,
      avg_active: activeDays ? total / activeDays : 0,
      active_days: activeDays,
      per_day: a.per_day,
    };
  }).filter(a => a.total > 0);

  // Sort
  agents.sort((a, b) => {
    let av, bv;
    if (sortCol === 'name') { av = a.name; bv = b.name; }
    else if (sortCol === 'total') { av = a.total; bv = b.total; }
    else if (sortCol === 'avg_cal') { av = a.avg_cal; bv = b.avg_cal; }
    else if (sortCol === 'avg_active') { av = a.avg_active; bv = b.avg_active; }
    else { av = a.per_day[sortCol] || 0; bv = b.per_day[sortCol] || 0; }
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  let maxDay = 0;
  for (const a of agents) for (const d of days) maxDay = Math.max(maxDay, a.per_day[d] || 0);
  const heat = v => {
    if (!v) return 'heat-0';
    if (v >= maxDay * 0.66) return 'heat-3';
    if (v >= maxDay * 0.33) return 'heat-2';
    return 'heat-1';
  };

  const th = (label, col) => {
    const sorted = sortCol === col ? 'sorted' : '';
    const arrow = sortCol === col ? (sortDir === 'desc' ? ' ↓' : ' ↑') : '';
    return `<th class="${sorted}" data-col="${col}">${label}${arrow}</th>`;
  };

  const fmt1 = n => n.toFixed(1);
  let html = '<table><thead><tr>';
  html += th('Agent', 'name');
  html += th('Total', 'total');
  html += th('Avg / cal day', 'avg_cal');
  html += th('Avg / active day', 'avg_active');
  for (const d of days) html += th(d.slice(5), d);
  html += '</tr></thead><tbody>';
  for (const a of agents) {
    html += '<tr>';
    html += `<td class="agent-name">${a.name}</td>`;
    html += `<td class="total-col">${fmt(a.total)}</td>`;
    html += `<td>${fmt1(a.avg_cal)}</td>`;
    html += `<td title="${a.active_days} active days">${fmt1(a.avg_active)}</td>`;
    for (const d of days) {
      const v = a.per_day[d] || 0;
      html += `<td class="${heat(v)}">${v || ''}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('agent-table').innerHTML = html;

  document.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.getAttribute('data-col');
      if (sortCol === col) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
      else { sortCol = col; sortDir = col === 'name' ? 'asc' : 'desc'; }
      renderTable();
    });
  });
}

function renderFooter() {
  const { days } = windowSlice();
  const m = CS_DATA.meta;
  document.getElementById('subtitle').textContent =
    `${days[0]} → ${days[days.length - 1]} (${days.length} days)`;
  const gen = new Date(m.generated_at);
  document.getElementById('footer').textContent =
    `Data: ${m.window_start} → ${m.window_end} (${m.window_days}d available) · Source: Gorgias /api/stats · Generated ${gen.toLocaleString()} · Excludes bots, admin-only, shared inboxes`;
}

function render() {
  renderKpis();
  renderChart();
  renderTable();
  renderFooter();
}

load();
</script>
</body>
</html>
