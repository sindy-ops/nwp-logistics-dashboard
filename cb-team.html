<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWP — CB Team</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-border: #2a2d3a;
    --text: #e4e6eb;
    --text-dim: #8b8fa3;
    --accent: #4ade80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    padding: 40px 24px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
  }
  .title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .back-links { display: flex; gap: 8px; }
  .back-link {
    font-size: 13px; color: var(--text-dim); text-decoration: none;
    padding: 8px 14px; border: 1px solid var(--card-border); border-radius: 8px;
    transition: border-color 0.15s;
  }
  .back-link:hover { border-color: var(--accent); color: var(--text); }

  .tabs {
    display: flex; gap: 4px; margin-bottom: 20px;
    border-bottom: 1px solid var(--card-border); padding-bottom: 0;
  }
  .tab {
    font-size: 13px; font-weight: 600; text-decoration: none; color: var(--text-dim);
    padding: 10px 18px; border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s; margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .person-cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px; margin-bottom: 24px;
  }
  .person-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 16px 18px; position: relative;
  }
  .person-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; border-radius: 12px 0 0 12px; background: var(--stripe-color, transparent);
  }
  .person-name { font-size: 13px; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 6px; }
  .person-total { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
  .person-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
  .person-plat {
    font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  .chart-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 20px 24px 24px; margin-bottom: 20px;
  }
  .chart-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
  }
  .chart-title { font-size: 16px; font-weight: 700; }
  .controls-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn-group { display: flex; gap: 6px; }
  .btn {
    background: transparent; border: 1px solid var(--card-border); color: var(--text-dim);
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    transition: all 0.15s; font-weight: 500;
  }
  .btn:hover { border-color: var(--text-dim); color: var(--text); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
  .btn-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); align-self: center; margin-right: 4px; }

  .chart-wrap { position: relative; height: 420px; }

  .person-legend {
    display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;
  }
  .person-chip {
    display: flex; align-items: center; gap: 8px; padding: 8px 14px;
    background: var(--bg); border: 1px solid var(--card-border); border-radius: 8px;
    font-size: 13px; cursor: pointer; user-select: none;
    transition: opacity 0.15s, border-color 0.15s;
  }
  .person-chip:hover { border-color: var(--text-dim); }
  .person-chip.disabled { opacity: 0.35; }
  .person-chip.disabled .chip-swatch { background: transparent !important; border: 1px solid var(--text-dim); }
  .chip-swatch { width: 12px; height: 12px; border-radius: 3px; }
  .chip-name { font-weight: 600; }
  .chip-count { color: var(--text-dim); font-variant-numeric: tabular-nums; }

  .footer-meta {
    margin-top: 16px; font-size: 11px; color: var(--text-dim); text-align: center;
  }
</style>
</head>

    <div class="chart-wrap"><canvas id="team-chart"></canvas></div>
    <div class="person-legend" id="person-legend"></div>
    <div class="footer-meta" id="footer-meta"></div>

    // Sum across platforms (respecting filter) → daily array
    const out = new Array(data.dates.length).fill(0);
    for (const plat of data.platforms) {
      if (currentFilter !== 'all' && plat !== currentFilter) continue;
      const arr = data.series[person][plat] || [];
      for (let i = 0; i < arr.length; i++) out[i] += arr[i] || 0;
    }
    return out;
  }

  // Build chart datasets
  const ctx = document.getElementById('team-chart').getContext('2d');
  const withAlpha = (hex, alphaHex) => hex + alphaHex;
  const datasets = data.persons.map(person => ({
    label: person,
    data: seriesForPerson(person),
    backgroundColor: (c) => {
      const label = c.chart.data.labels[c.dataIndex];
      return partialDatesSet.has(label)
        ? withAlpha(colorFor(person), '80')
        : colorFor(person);
    },
    borderWidth: 0,
    stack: 'team',
    hidden: false,
  }));

  const chart = new Chart(ctx, {
    type: 'bar',
    plugins: [totalOnTopPlugin],
    data: { labels: data.dates.slice(), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      layout: { padding: { top: 18 } },
      scales: {
        x: { stacked: true, ticks: { color: '#8b8fa3', maxRotation: 0, autoSkip: true, maxTicksLimit: 12 }, grid: { display: false } },
        y: { stacked: true, beginAtZero: true, ticks: { color: '#8b8fa3' }, grid: { color: 'rgba(255,255,255,0.05)' } },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1d27', borderColor: '#2a2d3a', borderWidth: 1,
          titleColor: '#e4e6eb', bodyColor: '#e4e6eb', padding: 10,
          callbacks: {
            footer: items => 'Total: ' + items.reduce((s, it) => s + (it.parsed.y || 0), 0),
          },
        },
      },
    },
  });

  // Build person chips legend
  const legendEl = document.getElementById('person-legend');
  legendEl.innerHTML = data.persons.map(p => `
    <div class="person-chip" data-person="${p}">
      <div class="chip-swatch" style="background:${colorFor(p)}"></div>
      <div class="chip-name">${p}</div>
      <div class="chip-count" data-chip-count="${p}">0</div>
    </div>
  `).join('');

  // Person cards (top)
  const cardsEl = document.getElementById('person-cards');

  function personCardHTML(person, totalInWindow, platformBreakdown) {
    // Top 2 platforms by count
    const sorted = Object.entries(platformBreakdown).filter(([,v]) => v > 0).sort((a,b) => b[1] - a[1]);
    const chips = sorted.slice(0, 3).map(([plat, n]) => {
      const c = PLAT_COLOR[plat] || '#6b7280';
      return `<span class="person-plat" style="background:${c}2a;color:${c}">${plat} ${n}</span>`;
    }).join('');
    const perDay = currentWindow > 0 ? Math.round(totalInWindow / currentWindow) : 0;
    return `
      <div class="person-card" style="--stripe-color:${colorFor(person)}">
        <div class="person-name">${person}</div>
        <div class="person-total">${fmtNum(totalInWindow)}</div>
        <div class="person-sub">${fmtNum(perDay)} / day · ${currentWindow}d window</div>
        <div class="person-sub">${chips}</div>
      </div>
    `;
  }

  function recompute() {
    const n = data.dates.length;
    const sliceStart = Math.max(0, n - currentWindow);
    chart.data.labels = data.dates.slice(sliceStart);

    const personTotalsInWindow = {};
    const personPlatformInWindow = {};

    chart.data.datasets.forEach((ds, i) => {
      const person = data.persons[i];
      ds.data = seriesForPerson(person).slice(sliceStart);
      ds.hidden = hiddenByLegend.has(person);
      const sum = ds.data.reduce((a, b) => a + b, 0);
      personTotalsInWindow[person] = sum;

      // Per-platform breakdown in window (respects filter)
      const breakdown = {};
      for (const plat of data.platforms) {
        if (currentFilter !== 'all' && plat !== currentFilter) continue;
        const arr = (data.series[person][plat] || []).slice(sliceStart);
        breakdown[plat] = arr.reduce((a,b) => a+b, 0);
      }
      personPlatformInWindow[person] = breakdown;
    });

    chart.update();

    // Update chips
    data.persons.forEach(person => {
      const el = legendEl.querySelector(`[data-chip-count="${person}"]`);
      if (el) el.textContent = fmtNum(personTotalsInWindow[person]);
      const chip = legendEl.querySelector(`[data-person="${person}"]`);
      if (chip) chip.classList.toggle('disabled', hiddenByLegend.has(person));
    });

    // Update person cards
    cardsEl.innerHTML = data.persons.map(p =>
      personCardHTML(p, personTotalsInWindow[p] || 0, personPlatformInWindow[p] || {})
    ).join('');

    document.getElementById('footer-meta').textContent =
      `window: ${currentWindow}d · platform filter: ${currentFilter} · ${chart.data.labels.length} daily buckets · generated ${data.generated_at}`;
  }

  // Window buttons
  document.querySelectorAll('.btn[data-window]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentWindow = parseInt(btn.dataset.window, 10);
      document.querySelectorAll('.btn[data-window]').forEach(b => b.classList.toggle('active', b === btn));
      recompute();
    });
  });

  // Filter buttons
  document.querySelectorAll('.btn[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.btn[data-filter]').forEach(b => b.classList.toggle('active', b === btn));
      recompute();
    });
  });

  // Legend chip clicks
  legendEl.querySelectorAll('.person-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const person = chip.dataset.person;
      if (hiddenByLegend.has(person)) hiddenByLegend.delete(person);
      else hiddenByLegend.add(person);
      recompute();
    });
  });

  recompute();
})();
</script>
</body>
</html>
